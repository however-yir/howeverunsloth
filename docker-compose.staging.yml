version: '3.9'
services:
  howeverunsloth:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.prod.example
    command: bash -lc "pip install -e . && python studio/backend/run.py --host 0.0.0.0 --port 8888"
    ports:
      - "8888:8888"
    restart: unless-stopped
