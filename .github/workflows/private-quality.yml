name: private-quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-studio:
    name: backend-studio
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install backend test dependencies (no torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            fastapi \
            httpx \
            structlog \
            pyyaml \
            matplotlib \
            pyjwt \
            datasets \
            python-multipart

      - name: Python syntax check
        run: |
          python -m py_compile \
            studio/backend/core/project_profile.py \
            studio/backend/core/errors.py \
            studio/backend/routes/config_management.py \
            studio/backend/utils/paths/path_utils.py \
            studio/backend/utils/hardware/hardware.py \
            studio/backend/utils/models/model_config.py \
            scripts/project_customize.py \
            scripts/check_brand_consistency.py

      - name: Brand consistency check
        run: |
          python scripts/check_brand_consistency.py

      - name: Backend and studio baseline tests
        run: |
          python -m pytest -q \
            studio/backend/tests \
            --ignore=studio/backend/tests/test_gpu_selection.py \
            --ignore=studio/backend/tests/test_gpu_selection_sandbox.py \
            -ra

  gpu-suite:
    name: gpu-suite
    runs-on: ubuntu-latest
    needs: backend-studio
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GPU logic test dependencies (no torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            fastapi \
            httpx \
            structlog \
            pyyaml \
            matplotlib \
            pyjwt \
            datasets \
            python-multipart

      - name: GPU logic tests (hardware-agnostic)
        run: |
          python -m pytest -q \
            studio/backend/tests/test_gpu_selection.py \
            studio/backend/tests/test_gpu_selection_sandbox.py \
            -ra

      - name: Detect CUDA runner
        id: cuda
        shell: bash
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            nvidia-smi || true
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install torch (CUDA runner only)
        if: steps.cuda.outputs.available == 'true'
        run: |
          python -m pip install torch

      - name: GPU runtime smoke (CUDA runner only)
        if: steps.cuda.outputs.available == 'true'
        run: |
          python -m pytest -q \
            studio/backend/tests/test_utils.py::TestGpuMemoryInfo::test_cuda_memory_info_mocked \
            -ra

      - name: Skip GPU runtime smoke on non-CUDA runner
        if: steps.cuda.outputs.available != 'true'
        run: |
          echo "CUDA runner not detected, skipped GPU runtime smoke."
